services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: staffdomain
      POSTGRES_PASSWORD: staffdomain
      POSTGRES_DB: staffdomain
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - .:/opt/staffdomain
    working_dir: /opt/staffdomain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: